<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Test Clone Website</title>
<style>
  html,body{margin:0;padding:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  h1{text-align:center;font-size:26px;margin:22px 0 14px;color:#222}
  .embed{max-width:1000px;margin:0 auto;padding:0 12px 30px}
</style>
</head>
<body>
  <h1>Test Clone Website</h1>
  <!-- "Make your own" link: hidden for now (kept in code). Editor is reachable via index.html?p=editor -->
  <p id="makeOwnLink" style="display:none;text-align:center;margin:-6px 0 16px"><a href="index.html?p=editor" style="color:#1668df;text-decoration:none;font-size:15px">&#9998; Make your own crossword &rarr;</a></p>
  <div class="embed">
    <iframe id="xw" height="700px" width="100%" allow="web-share; fullscreen" style="border:none; width: 100% !important; position: static;display: block !important; margin: 0 !important;" src="crossword.html" aria-label="NantGames Puzzle"> </iframe>
  </div>
  <script>
    // ?p=editor -> load the puzzle editor; any other ?p=/?puzzle= -> pass through to the player
    var params = new URLSearchParams(location.search);
    var iframe = document.getElementById('xw');
    if (params.get('p') === 'editor') {
      iframe.src = 'editor.html';
    } else if (location.search) {
      iframe.src = 'crossword.html' + location.search;
    }
  </script>
</body>
</html>
