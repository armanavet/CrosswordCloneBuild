<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Test Clone Website</title>
<style>
  html,body{margin:0;padding:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  h1{text-align:center;font-size:26px;margin:22px 0 14px;color:#222}
  .embed{max-width:1000px;margin:0 auto;padding:0 12px 30px}
</style>
</head>
<body>
  <h1>Test Clone Website</h1>
  <div class="embed">
    <iframe id="xw" height="700px" width="100%" allow="web-share; fullscreen" style="border:none; width: 100% !important; position: static;display: block !important; margin: 0 !important;" src="crossword.html" aria-label="NantGames Puzzle"> </iframe>
  </div>
  <script>
    // pass any ?p= / ?puzzle= param through to the embedded puzzle
    var q = location.search;
    if (q) document.getElementById('xw').src = 'crossword.html' + q;
  </script>
</body>
</html>
